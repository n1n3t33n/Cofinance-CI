{% load static %}
<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="{% block meta_description %}COFINANCE CI — Plateforme de microfinance et d'assurance mobile en Côte d'Ivoire{% endblock %}"/>
  <title>{% block title %}COFINANCE CI{% endblock %} | Microfinance & Assurance Mobile</title>

  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="{% static 'vendor/bootstrap/css/bootstrap.min.css' %}"/>
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
  <!-- Styles COFINANCE CI -->
  <link rel="stylesheet" href="{% static 'css/cofinance.css' %}"/>

  {% block extra_css %}{% endblock %}
</head>
<body>

  <!-- ── Navbar ──────────────────────────────────────────────── -->
  {% include 'base/navbar.html' %}

  <!-- ── Contenu principal ───────────────────────────────────── -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- ── Footer ──────────────────────────────────────────────── -->
  {% include 'base/footer.html' %}

  <!-- Bootstrap JS -->
  <script src="{% static 'vendor/bootstrap/js/bootstrap.bundle.min.js' %}"></script>
  <!-- JS principal -->
  <script src="{% static 'js/cofinance.js' %}"></script>

  {% block extra_js %}{% endblock %}
</body>
</html>
