{% load static %}
<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="{% block meta_description %}COFINANCE CI — Plateforme de microfinance et d'assurance mobile en Cote d'Ivoire{% endblock %}"/>
  <title>{% block title %}COFINANCE CI{% endblock %} | Microfinance et Assurance Mobile</title>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"/>

  <link rel="stylesheet" href="{% static 'vendor/bootstrap/css/bootstrap.min.css' %}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"/>
  <link rel="stylesheet" href="{% static 'css/cofinance.css' %}"/>

  {% block extra_css %}{% endblock %}
</head>
<body>

  {% include 'base/navbar.html' %}

  <main>
    {% block content %}{% endblock %}
  </main>

  {% include 'base/footer.html' %}

  <script src="{% static 'vendor/bootstrap/js/bootstrap.min.js' %}"></script>
  <script src="{% static 'js/cofinance.js' %}"></script>
  <script src="{% static 'js/animations.js' %}"></script>

  {% block extra_js %}{% endblock %}

  <!-- C — Conteneur toasts -->
  <div id="cf-toast-container" class="cf-toast-container"></div>

</body>
</html>
