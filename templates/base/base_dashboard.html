{% extends 'base/base.html' %}
{% load static %}

{% block content %}
<div class="cf-dash-shell" style="min-height:calc(100vh - 70px)">

  <!-- Sidebar -->
  {% block sidebar %}{% endblock %}

  <!-- Contenu principal -->
  <div class="cf-dash-main" style="flex:1;padding:32px;background:var(--cf-bg);overflow-x:hidden">

    <!-- En-tete page -->
    <div class="d-flex align-items-center justify-content-between mb-4 flex-wrap gap-3">
      <div>
        <div class="cf-dash-greeting">
          <i class="bi bi-hand-thumbs-up"></i> Bonjour <span class="cf-user-name">…</span>
        </div>
        <h1 style="font-size:1.4rem;font-weight:800;margin:0">
          {% block page_title %}Dashboard{% endblock %}
        </h1>
        <p style="color:var(--cf-text-muted);font-size:0.88rem;margin:4px 0 0">
          {% block page_subtitle %}{% endblock %}
        </p>
      </div>
      <div class="d-flex align-items-center gap-3">
        {% block page_actions %}{% endblock %}
      </div>
    </div>

    <!-- Alerte globale -->
    <div id="alerte-dashboard" class="cf-alert mb-4">
      <i class="bi bi-info-circle" id="alerte-dashboard-icon"></i>
      <span id="alerte-dashboard-msg"></span>
    </div>

    <!-- Contenu -->
    {% block dashboard_content %}{% endblock %}

  </div>
</div>
{% endblock %}
