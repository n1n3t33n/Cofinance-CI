{% load static %}
<nav class="cf-navbar navbar navbar-expand-lg">
  <div class="container">

    <!-- Logo -->
    <a class="navbar-brand" href="/">
      <span class="orange">CO</span><span class="green">FINANCE</span> CI
    </a>

    <!-- Burger mobile -->
    <button class="navbar-toggler border-0" type="button"
            data-bs-toggle="collapse" data-bs-target="#cfNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="cfNav">

      <!-- Liens publics -->
      <ul class="navbar-nav me-auto" id="nav-public">
        <li class="nav-item">
          <a class="nav-link" href="/">Accueil</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/services/">Services</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/a-propos/">À propos</a>
        </li>
      </ul>

      <!-- Actions droite -->
      <div class="d-flex align-items-center gap-3">

        <!-- Toggle thème -->
        <button class="cf-toggle-theme cf-theme-toggle border-0 p-0"
                title="Changer le thème" aria-label="Toggle thème">
        </button>
        <span class="cf-theme-icon">🌙</span>

        <!-- Non connecté -->
        <div id="nav-guest" class="d-flex gap-2">
          <a href="/connexion/" class="btn-cf-outline btn">Connexion</a>
          <a href="/inscription/" class="btn-cf-primary btn">Inscription</a>
        </div>

        <!-- Connecté -->
        <div id="nav-user" class="d-flex align-items-center gap-3" style="display:none!important">

          <!-- Notifications -->
          <a href="/notifications/" class="position-relative text-decoration-none"
             style="color: var(--cf-text-muted)">
            <i class="bi bi-bell fs-5"></i>
            <span class="cf-notif-badge cf-notif-count" style="display:none">0</span>
          </a>

          <!-- Menu utilisateur -->
          <div class="dropdown">
            <button class="btn d-flex align-items-center gap-2 p-0 border-0 bg-transparent"
                    data-bs-toggle="dropdown">
              <div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--cf-orange),var(--cf-orange-dark));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.9rem;">
                <span class="cf-user-avatar">U</span>
              </div>
              <div class="text-start d-none d-lg-block">
                <div style="font-size:0.85rem;font-weight:700;color:var(--cf-text)"
                     class="cf-user-name">Utilisateur</div>
                <div style="font-size:0.72rem;color:var(--cf-text-muted)"
                     class="cf-user-role">Rôle</div>
              </div>
              <i class="bi bi-chevron-down" style="font-size:0.75rem;color:var(--cf-text-muted)"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow border-0 rounded-3 mt-2"
                style="background:var(--cf-surface);border:1px solid var(--cf-border)!important;min-width:200px">
              <li>
                <a class="dropdown-item py-2" href="#"
                   id="nav-dashboard-link"
                   style="color:var(--cf-text);font-weight:600">
                  <i class="bi bi-speedometer2 me-2 text-orange"></i>
                  Mon dashboard
                </a>
              </li>
              <li>
                <a class="dropdown-item py-2" href="/profil/"
                   style="color:var(--cf-text);font-weight:600">
                  <i class="bi bi-person me-2 text-orange"></i>
                  Mon profil
                </a>
              </li>
              <li><hr class="dropdown-divider" style="border-color:var(--cf-border)"></li>
              <li>
                <a class="dropdown-item py-2 cf-logout" href="#"
                   style="color:#EF4444;font-weight:600">
                  <i class="bi bi-box-arrow-right me-2"></i>
                  Déconnexion
                </a>
              </li>
            </ul>
          </div>
        </div>

      </div>
    </div>
  </div>
</nav>

<script>
  /* Affichage conditionnel navbar selon connexion */
  (function() {
    const token = localStorage.getItem('cf_access');
    const user  = localStorage.getItem('cf_user');
    if (token && user) {
      document.getElementById('nav-guest').style.display = 'none';
      document.getElementById('nav-user').style.removeProperty('display');
      // Lien dashboard selon rôle
      try {
        const u = JSON.parse(user);
        const routes = {
          client: '/dashboard/client/',
          agent:  '/dashboard/agent/',
          administrateur: '/dashboard/admin/'
        };
        const link = document.getElementById('nav-dashboard-link');
        if (link) link.href = routes[u.role] || '/';
      } catch(e) {}
    }
  })();
</script>
