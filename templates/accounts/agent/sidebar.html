{% load static %}
<aside class="cf-sidebar d-none d-lg-block">

  <!-- Profil -->
  <div class="text-center mb-4 pb-4"
       style="border-bottom:1px solid var(--cf-border)">
    <div class="cf-avatar-circle"
         style="width:56px;height:56px;background:linear-gradient(135deg,var(--cf-green),var(--cf-green-dark));margin:0 auto 10px">
      <span class="cf-user-avatar">A</span>
    </div>
    <div style="font-weight:700;font-size:0.92rem" class="cf-user-name">Agent</div>
    <div class="d-flex align-items-center justify-content-center gap-2 mt-1">
      <span class="cf-badge cf-badge-green" style="font-size:0.7rem">Agent</span>
      <span id="badge-disponibilite" class="cf-badge cf-badge-gray"
            style="font-size:0.7rem">Indisponible</span>
    </div>
  </div>

  <!-- Toggle disponibilite -->
  <div class="mb-3 p-3"
       style="background:var(--cf-surface-2);border-radius:var(--cf-radius);border:1px solid var(--cf-border)">
    <div style="font-size:0.78rem;font-weight:700;color:var(--cf-text-muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px">
      Disponibilite
    </div>
    <button id="btn-toggle-dispo" class="btn w-100 py-2"
            style="border-radius:var(--cf-radius);font-size:0.85rem;font-weight:700;border:2px solid var(--cf-border);background:var(--cf-surface);color:var(--cf-text-muted)"
            onclick="toggleDisponibilite()">
      <i class="bi bi-circle me-2" id="icon-dispo"></i>
      <span id="label-dispo">Se rendre disponible</span>
    </button>
  </div>

  <!-- Navigation -->
  <div class="sidebar-section">Navigation</div>

  <a href="#" class="sidebar-link active" id="nav-accueil"
     onclick="afficherSection('accueil'); return false">
    <div class="sidebar-icon"><i class="bi bi-speedometer2"></i></div>
    Tableau de bord
  </a>

  <div class="sidebar-section">Credits</div>

  <a href="#" class="sidebar-link" id="nav-dossiers"
     onclick="afficherSection('dossiers'); return false">
    <div class="sidebar-icon"><i class="bi bi-folder2-open"></i></div>
    Dossiers credits
  </a>

  <a href="#" class="sidebar-link" id="nav-paiements"
     onclick="afficherSection('paiements'); return false">
    <div class="sidebar-icon"><i class="bi bi-cash-coin"></i></div>
    Enregistrer paiement
  </a>

  <a href="#" class="sidebar-link" id="nav-penalites"
     onclick="afficherSection('penalites'); return false">
    <div class="sidebar-icon"><i class="bi bi-exclamation-triangle"></i></div>
    Penalites
  </a>

  <div class="sidebar-section">Support</div>

  <a href="#" class="sidebar-link" id="nav-conversations"
     onclick="afficherSection('conversations'); return false">
    <div class="sidebar-icon"><i class="bi bi-chat-dots"></i></div>
    Conversations
    <span id="badge-convs-attente" class="cf-notif-count ms-auto cf-badge cf-badge-orange"
          style="display:none;font-size:0.7rem">0</span>
  </a>

  <div class="sidebar-section">Compte</div>

  <a href="#" class="sidebar-link" id="nav-profil"
     onclick="afficherSection('profil'); return false">
    <div class="sidebar-icon"><i class="bi bi-person"></i></div>
    Mon profil
  </a>

  <div style="margin-top:32px;padding-top:24px;border-top:1px solid var(--cf-border)">
    <a href="#" class="sidebar-link cf-logout" style="color:#EF4444">
      <div class="sidebar-icon" style="color:#EF4444">
        <i class="bi bi-box-arrow-right"></i>
      </div>
      Deconnexion
    </a>
  </div>

</aside>
