{% extends 'base/base.html' %}
{% load static %}

{% block title %}Connexion{% endblock %}

{% block content %}
<section style="min-height:calc(100vh - 140px);display:flex;align-items:center;background:var(--cf-bg);padding:48px 0">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5 col-md-7">

        <!-- En-tete -->
        <div class="text-center mb-4">
          <a href="/" style="font-size:1.6rem;font-weight:800;color:var(--cf-text);text-decoration:none">
            <span style="color:var(--cf-orange)">CO</span><span style="color:var(--cf-green)">FINANCE</span> CI
          </a>
          <h1 style="font-size:1.5rem;font-weight:800;margin-top:20px;margin-bottom:8px">
            Bon retour parmi nous
          </h1>
          <p style="color:var(--cf-text-muted);font-size:0.92rem">
            Connectez-vous pour acceder a votre espace
          </p>
        </div>

        <!-- Carte formulaire -->
        <div class="cf-card">

          <!-- Alerte erreur -->
          <div id="alerte-connexion" class="cf-alert cf-alert-error mb-4">
            <i class="bi bi-exclamation-circle"></i>
            <span id="msg-erreur"></span>
          </div>

          <!-- Champ identifiant -->
          <div class="mb-3">
            <label class="cf-label" for="username">
              <i class="bi bi-person me-1"></i> Identifiant
            </label>
            <input type="text" id="username" class="cf-input"
                   placeholder="Votre nom d'utilisateur" autocomplete="username"/>
          </div>

          <!-- Champ mot de passe -->
          <div class="mb-4">
            <label class="cf-label" for="password">
              <i class="bi bi-lock me-1"></i> Mot de passe
            </label>
            <div style="position:relative">
              <input type="password" id="password" class="cf-input"
                     placeholder="Votre mot de passe" autocomplete="current-password"
                     style="padding-right:48px"/>
              <button type="button" id="toggle-password"
                      style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--cf-text-muted);cursor:pointer;padding:0">
                <i class="bi bi-eye" id="eye-icon"></i>
              </button>
            </div>
          </div>

          <!-- Bouton connexion -->
          <button id="btn-connexion" class="btn-cf-primary btn w-100 py-3"
                  onclick="seConnecter()">
            <i class="bi bi-box-arrow-in-right me-2"></i>
            Se connecter
          </button>

          <!-- Lien inscription -->
          <div class="text-center mt-4" style="font-size:0.9rem;color:var(--cf-text-muted)">
            Pas encore de compte ?
            <a href="/inscription/" style="font-weight:700">Creer un compte</a>
          </div>

        </div>


      </div>
    </div>
  </div>
</section>
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/auth.js' %}"></script>
{% endblock %}
